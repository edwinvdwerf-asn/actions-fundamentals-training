name: GitHub Actions Demo

on:
  push:
    branches:
      - main
    paths-ignore:
      - .github/**
  pull_request: 
    branches:
      - main
  schedule: 
    - cron: "15 6 * * 0"
  workflow_dispatch: 

jobs:
  ubuntu_build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Print event name that triggered the workflow
        run: |
          echo "event name: ${{ github.event_name }}"
      - name: Print ref
        run: |
          echo "ref: ${{ github.ref }}"
      - name: Print repo files
        run: |
          echo "The repository ${{ github.repository }} contains the following files:"
          tree
