name: GitHub Actions Demo

on:
  push:
    branches:
      - main
    paths-ignore:
      - .github/**
  pull_request: 
    branches:
      - main
  schedule: 
    - cron: "15 6 * * 0"
  workflow_dispatch: 

jobs:
  ubuntu_build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Print event name that triggered the workflow
        run: |
          echo $GITHUB_EVENT_NAME
      - name: Print ref
        run: |
          echo $GITHUB_HEAD_REF
      - name: Print repo files
        run: |
          echo todo
      

