name: demo   
on: [push]

jobs:
  hello_world_job:
    runs-on: ubuntu-latest
    name: A job to say hello
    steps:
      - uses: actions/checkout@v6
      - id: foo
        uses: edwinvdwerf-asn/composite-action-training@6d35cebd2dca3776be934afc92012be668dbee59
        with:
          who-to-greet: 'Edwin van de Werf'
      - run: echo random-number "$RANDOM_NUMBER"
        shell: bash
        env:
          RANDOM_NUMBER: ${{ steps.foo.outputs.random-number }}
